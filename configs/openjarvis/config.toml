# OpenJarvis configuration — JARVIS personal assistant for Pau
# Engine: Groq Cloud API | OS: Windows | Timezone: Europe/Madrid

# ═══════════════════════════════════════════════════════════════
# PILLAR 1: Intelligence — The Model
# ═══════════════════════════════════════════════════════════════
[intelligence]
default_model = "openrouter/deepseek/deepseek-r1" # High-performance reasoning model via OpenRouter
fallback_model = "openrouter/auto"              # Automatic fallback via OpenRouter
preferred_engine = "cloud"                      # Use the cloud engine for OpenRouter
provider = "cloud"                           # No local GPU required
quantization = "none"                        # N/A for cloud models
# Generation defaults — conversational, not deterministic
temperature = 0.7
max_tokens = 1024
top_p = 0.9
top_k = 40
repetition_penalty = 1.0

# ═══════════════════════════════════════════════════════════════
# PILLAR 2: Agent — The Agentic Harness
# ═══════════════════════════════════════════════════════════════
[agent]
default_agent = "native_react"               # ReAct agent for interactive use
max_turns = 10
tools = "code_interpreter,web_search,file_read,calculator,think"
objective = "Asistente personal inteligente para Pau"
context_from_memory = true                   # Inject relevant memory into prompts
system_prompt_path = "configs/openjarvis/prompts/jarvis_system.md"

# ═══════════════════════════════════════════════════════════════
# PILLAR 3: Tools — MCP Interface
# ═══════════════════════════════════════════════════════════════
[tools.storage]
default_backend = "sqlite"
db_path = "~/.openjarvis/memory.db"
context_top_k = 5
context_min_score = 0.3
context_max_tokens = 2000

[tools.mcp]
enabled = true

# ═══════════════════════════════════════════════════════════════
# PILLAR 4: Engine — The Inference Runtime
# ═══════════════════════════════════════════════════════════════
[engine]
default = "groq"

# Groq Cloud — uses GROQ_API_KEY env var
# api_key_env = "GROQ_API_KEY"
# base_url = "https://api.groq.com/openai/v1"

# Ollama — kept for future local model use
[engine.ollama]
host = "http://localhost:11434"

# vLLM — commented out, not applicable on Windows personal setup
# [engine.vllm]
# host = "http://localhost:8001"

# SGLang — commented out
# [engine.sglang]
# host = "http://localhost:30000"

# llama.cpp — kept for potential local GGUF inference
[engine.llamacpp]
host = "http://localhost:8080"

# ═══════════════════════════════════════════════════════════════
# PILLAR 5: Learning — Improvement Methodologies
# ═══════════════════════════════════════════════════════════════
[learning]
enabled = true                               # Learn from interactions
training_enabled = true                      # Enable LoRA self-improvement
min_improvement = 0.05                       # Min accuracy delta to promote model


[learning.routing]
policy = "heuristic"                         # Smart routing between models

[learning.data]
privacy_filter = true
exclude_channels = ["email", "calendar"]
min_quality_score = 0.6
export_dir = "~/.openjarvis/training_data"

[learning.intelligence]
policy = "sft"                               # Switched to SFT for local LoRA pipeline

[learning.intelligence.sft]
lora_rank = 16
lora_alpha = 32
lora_dropout = 0.05
min_pairs = 50
max_pairs = 2000
eval_split = 0.15
epochs = 3
learning_rate = 0.0002
batch_size = 4
gradient_accumulation_steps = 4
warmup_steps = 100
save_steps = 50
eval_steps = 50
output_dir = "~/.openjarvis/lora_checkpoints"
base_model = "openrouter/deepseek/deepseek-r1"
dry_run = true                               # Default to dry_run for local windows


[learning.agent]
policy = "none"                              # No agent optimization yet

[learning.metrics]
accuracy_weight = 0.6
latency_weight = 0.2
cost_weight = 0.1
efficiency_weight = 0.1

# ═══════════════════════════════════════════════════════════════
# Supporting config
# ═══════════════════════════════════════════════════════════════
[telemetry]
enabled = true
db_path = "~/.openjarvis/telemetry.db"
gpu_metrics = false                          # No local GPU on Windows
gpu_poll_interval_ms = 50
energy_vendor = ""

[traces]
enabled = true
db_path = "~/.openjarvis/traces.db"

[server]
host = "127.0.0.1"
port = 8000
agent = "orchestrator"

[security]
enabled = true                               # Active for personal use
profile = "personal"                         # Personal security preset

# ═══════════════════════════════════════════════════════════════
# Channels — Telegram as primary communication
# ═══════════════════════════════════════════════════════════════
[channel]
enabled = true
default_channel = "telegram"
default_agent = "native_react"

# ═══════════════════════════════════════════════════════════════
# Digest — Morning briefing for Pau
# ═══════════════════════════════════════════════════════════════
[digest]
enabled = true
schedule = "0 8 * * *"
timezone = "Europe/Madrid"
persona = "jarvis"
honorific = "Pau"
voice_id = "es-ES-AlvaroNeural"
voice_speed = 1.1
tts_backend = "edge-tts"
sections = ["email", "calendar", "news", "github", "health"]


[digest.messages]
sources = ["gmail"]

[digest.calendar]
sources = ["gcalendar"]

[digest.world]
sources = ["https://news.ycombinator.com/rss", "https://feeds.bbci.co.uk/mundo/rss.xml"]

# ═══════════════════════════════════════════════════════════════
# Scheduler — Scheduled background tasks
# ═══════════════════════════════════════════════════════════════
[scheduler]
enabled = true

[scheduler.nightly_train]
cron = "0 3 * * *"
job = "openjarvis.learning.nightly_train_job:run"
enabled = true
